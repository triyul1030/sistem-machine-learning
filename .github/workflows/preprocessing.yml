name: Data Preprocessing Automation

on:
  push:
    branches:
      - main
    paths:
      - 'dataset_raw/**'
      - 'preprocessing/automate_Tri-Yulianto.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_Tri-Yulianto.py

      - name: Commit and push processed data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add preprocessing/dataset_preprocessing/
          
          git commit -m "Auto-update preprocessed data [skip ci]" || echo "No changes to commit"
          git push
